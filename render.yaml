services:
  - name: food-intel-api
    type: web
    runtime: python
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: pip install -e ".[api]"
    startCommand: PYTHONPATH=src uvicorn food_intel.api.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: FOOD_INTEL_LLM_PROVIDER
        value: "null"
      - key: FOOD_INTEL_ENABLE_OPENFOODFACTS
        value: "true"
      - key: FOOD_INTEL_CORS_ORIGINS
        sync: false

  - name: food-intel-web
    type: web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: VITE_API_BASE
        sync: false
